{% extends "baseLogado.html" %}
{% block content %}
<div class="container py-4">
    <div class="row mb-4">
        <div class="col">
            <h1 class="fw-bold"><i class="bi bi-wrench-adjustable-circle text-primary me-2"></i>Mecânicos da Oficina</h1>
        </div>
        <div class="col text-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalMecanico">
                <i class="bi bi-plus-lg me-2"></i>Cadastrar Mecânico
            </button>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-3 bg-white">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Nome</th>
                        <th>Especialidade</th>
                        <th class="pe-4">Telefone</th>
                    </tr>
                </thead>
                <tbody>
                    {% for m in mecanicos %}
                    <tr>
                        <td class="ps-4 fw-semibold text-dark">{{ m.nome }}</td>
                        <td><span class="badge bg-info text-dark">{{ m.especialidade or 'Geral' }}</span></td>
                        <td class="pe-4">{{ m.telefone or 'Não informado' }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">Nenhum mecânico cadastrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="modalMecanico" tabindex="-1">
    <div class="modal-dialog">
        <form action="/mecanicos" method="POST" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Novo Mecânico</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Especialidade (ex: Alinhamento, Elétrica)</label>
                    <input type="text" name="especialidade" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" name="telefone" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
