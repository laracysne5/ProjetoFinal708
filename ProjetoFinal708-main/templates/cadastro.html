{% extends "base.html" %}

{% block title %}Criar Conta - SuperOS{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            
            <div class="card shadow border-0 rounded-3 bg-white">
                <div class="card-body p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 text-primary d-inline-block p-3 rounded-circle mb-2">
                            <i class="bi bi-person-plus-fill display-6"></i>
                        </div>
                        <h2 class="fw-bold text-dark h4 mb-1">Criar Nova Conta</h2>
                        <p class="text-muted small">Cadastre um usuário para acessar o gerenciador da oficina</p>
                    </div>

                    <form action="/cadastro" method="POST">
                        
                        <div class="mb-3">
                            <label for="nome" class="form-label fw-semibold text-secondary small">Nome Completo</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="nome" name="nome" placeholder="Digite seu nome" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold text-secondary small">E-mail Corporativo</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" placeholder="nome@empresa.com" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="senha" class="form-label fw-semibold text-secondary small">Senha de Acesso</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-muted"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="senha" name="senha" placeholder="Crie uma senha forte" required>
                            </div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                                <i class="bi bi-check-circle-fill me-2"></i>Concluir Cadastro
                            </button>
                        </div>

                        <div class="text-center mt-4">
                            <p class="text-muted small mb-0">Já tem uma conta? <a href="/" class="text-primary fw-semibold text-decoration-none">Faça Login</a></p>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
